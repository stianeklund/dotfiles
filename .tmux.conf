### Prefix Configuration ###
set -g prefix C-b
bind C-b send-prefix

### Reload Configuration ###
bind C-r source-file ~/.tmux.conf \; display-message "Config reloaded!"

### Shell ###
set -g default-shell /usr/bin/fish

### Terminal ###
set -sg escape-time 1
set -g default-terminal "xterm-256color"

### Numbering ###
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

### Titles & Status Bar ###
set -g set-titles-string "#I:#P - #W - #T"

### Key Modes ###
setw -g mode-keys vi
set -g status-keys vi

### Activity ###
setw -g monitor-activity on

### Pane Navigation (Vi-style with hjkl) ###
unbind h
bind h select-pane -L

unbind j
bind j select-pane -D

unbind k
bind k select-pane -U

unbind l
bind l select-pane -R

### Pane Resizing (Vi-style with HJKL) ###
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

### Pane Movement ###
# Break current pane into its own window
bind b break-pane

# Break current pane into a chosen window number
bind B command-prompt -p "New window number:" "break-pane -t ':%%'"

# Join current pane into an existing window
bind M command-prompt -p "Target window:" "join-pane -s '!.' -t ':%%'"

### Copy Mode Customization ###
bind ( copy-mode
bind ) paste-buffer

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"

### TPM Plugin Manager ###
set -g @plugin 'seebi/tmux-colors-solarized'
set -g @colors-solarized '256'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
